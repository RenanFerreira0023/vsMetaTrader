<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaTrader Dialog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #22263a;
            --border: rgba(255,255,255,0.08);
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.35);
            --accent-hover: #8a84ff;
            --text: #e8eaf0;
            --text-muted: #7a7f9a;
            --success: #22c55e;
            --error: #f87171;
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── LAYOUT ── */
        body {
            display: flex;
            flex-direction: column;
        }

        /* ── MESSAGES AREA ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }

        .msg-bubble {
            max-width: 88%;
            padding: 10px 16px;
            border-radius: var(--radius);
            font-size: 13.5px;
            line-height: 1.6;
            animation: slideUp 0.25s ease;
        }

        .msg-bubble.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #9c74ff);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.system {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-bottom-left-radius: 4px;
            font-size: 12.5px;
        }

        .msg-bubble.success-response {
            align-self: flex-start;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: var(--success);
            border-bottom-left-radius: 4px;
        }

        .msg-bubble.error-response {
            align-self: flex-start;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.25);
            color: var(--error);
            border-bottom-left-radius: 4px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── STATUS BADGE ── */
        #status {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 4px 0;
            letter-spacing: 0.03em;
            min-height: 20px;
            transition: color var(--transition);
        }

        /* ── BOTTOM INPUT BAR ── */
        #inputBar {
            padding: 14px 16px 18px;
            background: rgba(26, 29, 39, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #inputText {
            flex: 1;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 13.5px;
            font-family: inherit;
            color: var(--text);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #inputText::placeholder {
            color: var(--text-muted);
        }

        #inputText:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #sendButton {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), #9c74ff);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        #sendButton:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(108, 99, 255, 0.55);
        }

        #sendButton:active {
            transform: scale(0.96);
        }

        #sendButton:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* SVG icon */
        #sendButton svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }


        /* ── ATTACH BUTTON ── */
        #attachBtn {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface-2);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        #attachBtn:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
            background: rgba(108, 99, 255, 0.1);
        }

        #attachBtn.has-file {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 99, 255, 0.12);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #attachBtn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── FILE CHIP ── */
        #fileChip {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(108, 99, 255, 0.12);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 20px;
            padding: 4px 10px 4px 8px;
            font-size: 11.5px;
            color: var(--accent-hover);
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            animation: slideUp 0.2s ease;
        }

        #fileChip.visible { display: flex; }

        #fileChip span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #fileChipRemove {
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.6;
            font-size: 13px;
            line-height: 1;
            transition: opacity var(--transition);
        }

        #fileChipRemove:hover { opacity: 1; }


        /* ── SPINNER ── */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Mensagens / log de resposta -->
    <div id="messages">
        <div class="msg-bubble system">
            👋 Olá! Digite uma mensagem e clique em <strong>Enviar</strong>. Use o 📎 para anexar um arquivo de texto — ele será enviado como <code>base64</code> no body do POST.
        </div>
    </div>

    <div id="status"></div>

    <!-- Chip do arquivo anexado (acima da barra) -->
    <div id="fileChipRow" style="padding: 0 16px 6px; display:flex;">
        <div id="fileChip">
            📄 <span id="fileChipName"></span>
            <span id="fileChipRemove" title="Remover arquivo">✕</span>
        </div>
    </div>

    <!-- Input de arquivo oculto -->
    <input id="fileInput" type="file" accept=".txt,.log,.csv,.json,.md" style="display:none" />

    <!-- Barra de input ancorada na parte inferior -->
    <div id="inputBar">
        <!-- Botão de anexar -->
        <button id="attachBtn" title="Anexar arquivo de texto">
            <svg viewBox="0 0 24 24">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>

        <input
            id="inputText"
            type="text"
            placeholder="Digite uma mensagem..."
            autocomplete="off"
        />

        <!-- Botão de enviar -->
        <button id="sendButton" title="Enviar">
            <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        const inputEl       = document.getElementById('inputText');
        const sendBtn       = document.getElementById('sendButton');
        const attachBtn     = document.getElementById('attachBtn');
        const fileInput     = document.getElementById('fileInput');
        const fileChip      = document.getElementById('fileChip');
        const fileChipName  = document.getElementById('fileChipName');
        const fileChipRemove= document.getElementById('fileChipRemove');
        const messagesEl    = document.getElementById('messages');
        const statusEl      = document.getElementById('status');

        // Estado do arquivo anexado
        let attachedFile = null; // { name, b64 }

        /* ── helpers ── */
        function addBubble(text, type = 'sent') {
            const div = document.createElement('div');
            div.className = `msg-bubble ${type}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setStatus(msg, color = '') {
            statusEl.textContent = msg;
            statusEl.style.color = color || 'var(--text-muted)';
        }

        /* ── Lógica de anexo ── */
        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                // Converte o conteúdo para Base64
                const b64 = btoa(
                    encodeURIComponent(e.target.result).replace(
                        /%([0-9A-F]{2})/g,
                        (_, p1) => String.fromCharCode('0x' + p1)
                    )
                );
                attachedFile = { name: file.name, b64 };

                // Mostra chip
                fileChipName.textContent = file.name;
                fileChip.classList.add('visible');
                attachBtn.classList.add('has-file');
                setStatus(`📎 "${file.name}" pronto para envio`, 'var(--accent-hover)');
                setTimeout(() => setStatus(''), 2500);
            };
            reader.readAsText(file, 'UTF-8');
            fileInput.value = ''; // permite reanexar o mesmo arquivo
        });

        fileChipRemove.addEventListener('click', () => {
            attachedFile = null;
            fileChip.classList.remove('visible');
            attachBtn.classList.remove('has-file');
        });

        /* ── Enviar: POST para httpbin.org com o texto do input ── */
        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Mostra a mensagem enviada
            addBubble(text, 'sent');
            inputEl.value = '';
            inputEl.focus();

            // Monta o body da requisição
            const payload = {
                message:   text,
                timestamp: new Date().toISOString(),
                ...(attachedFile && {
                    attachment: {
                        filename: attachedFile.name,
                        encoding: 'base64',
                        data:     attachedFile.b64
                    }
                })
            };

            // Limpa anexo após envio
            const hadFile = !!attachedFile;
            attachedFile = null;
            fileChip.classList.remove('visible');
            attachBtn.classList.remove('has-file');

            // Bloqueia o botão com spinner
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span>';
            setStatus('Enviando requisição POST…');

            try {
                /*
                 * ─────────────────────────────────────────────────────────
                 *  CHAMADA POST
                 *  URL: https://httpbin.org/post  (ecoa o body de volta)
                 *  Troque pela URL real do seu servidor quando precisar.
                 * ─────────────────────────────────────────────────────────
                 */
                const response = await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 'Authorization': 'Bearer SEU_TOKEN_AQUI'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} – ${response.statusText}`);
                }

                const data = await response.json();

                const label = hadFile ? ` + arquivo anexado` : '';
                addBubble(`✅ Resposta (${response.status})${label}:\n${JSON.stringify(data.json, null, 2)}`, 'success-response');
                setStatus(`POST concluído · ${response.status}`, 'var(--success)');

                // Repassa resultado para a extensão
                vscode.postMessage({ command: 'postResult', data });

            } catch (err) {
                addBubble(`❌ Erro: ${err.message}`, 'error-response');
                setStatus('Falha na requisição', 'var(--error)');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
                setTimeout(() => setStatus(''), 3000);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) sendMessage();
        });

        /* ── Recebe mensagens vindas da extensão ── */
        window.addEventListener('message', event => {
            const msg = event.data;
            if (msg?.text) {
                addBubble(`🤖 Extensão: ${msg.text}`, 'system');
            }
        });
    </script>
</body>
</html>
